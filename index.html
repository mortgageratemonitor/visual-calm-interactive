function initDesert() {
  camera.position.set(0, 3, 0);
  camera.rotation.set(0, 0, 0);
  scene.fog = new THREE.FogExp2(0x060818, 0.007);
  renderer.setClearColor(0x060818, 1);

  // Background sphere
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(600, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0x00000c, side: THREE.BackSide })
  ));

  // [5] Stars with per-star twinkle phase
  const STARS = 7000;
  const sPos   = new Float32Array(STARS * 3);
  const sCol   = new Float32Array(STARS * 3);
  const sTwink = new Float32Array(STARS); // twinkle phase per star
  for (let i = 0; i < STARS; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 280 + Math.random() * 100;
    sPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    sPos[i*3+1] = Math.abs(r * Math.sin(phi) * Math.sin(theta)) + 2;
    sPos[i*3+2] = r * Math.cos(phi);
    const warm  = Math.random() < 0.3;
    const col   = new THREE.Color().setHSL(warm ? 0.1 : 0.62, 0.3, 0.7 + Math.random() * 0.3);
    sCol[i*3] = col.r; sCol[i*3+1] = col.g; sCol[i*3+2] = col.b;
    sTwink[i] = Math.random() * Math.PI * 2;
  }
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
  sGeo.setAttribute('color',    new THREE.BufferAttribute(sCol, 3));
  const starPoints = new THREE.Points(sGeo, new THREE.PointsMaterial({
    vertexColors: true, size: 0.45, transparent: true, opacity: 0.85,
  }));
  scene.add(starPoints);

  // Moon
  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(4.5, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0xf0eacc, transparent: true, opacity: 0.95 })
  );
  moon.position.set(-35, 55, -280);
  scene.add(moon);

  // Moon soft outer glow
  const moonGlow = new THREE.Mesh(
    new THREE.SphereGeometry(9, 16, 16),
    new THREE.MeshBasicMaterial({
      color: 0xddeeff, transparent: true, opacity: 0.07,
      blending: THREE.AdditiveBlending, depthWrite: false,
    })
  );
  moonGlow.position.copy(moon.position);
  scene.add(moonGlow);

  // [1] Moonlight color grading — blue-silver wash across scene
  const moonlightGeo = new THREE.PlaneGeometry(600, 600);
  moonlightGeo.rotateX(-Math.PI / 2);
  const moonlightMat = new THREE.MeshBasicMaterial({
    color: 0x1a2a5a, transparent: true, opacity: 0.38,
    depthWrite: false, blending: THREE.AdditiveBlending,
  });
  const moonlight = new THREE.Mesh(moonlightGeo, moonlightMat);
  moonlight.position.y = 0.5;
  scene.add(moonlight);

  // [1] Horizon glow — brighter tint near horizon
  const horizonGeo = new THREE.PlaneGeometry(600, 80);
  const horizonMat = new THREE.MeshBasicMaterial({
    color: 0x223366, transparent: true, opacity: 0.32,
    depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const horizonMesh = new THREE.Mesh(horizonGeo, horizonMat);
  horizonMesh.position.set(0, 2, -120);
  horizonMesh.rotation.x = Math.PI / 2 - 0.18;
  scene.add(horizonMesh);

  // Ground — slightly blue-tinted
  const groundGeo = new THREE.PlaneGeometry(600, 600);
  groundGeo.rotateX(-Math.PI / 2);
  scene.add(new THREE.Mesh(groundGeo, new THREE.MeshBasicMaterial({ color: 0x141828 })));

  // Moon shimmer on sand
  const shimmerGeo = new THREE.PlaneGeometry(400, 400);
  shimmerGeo.rotateX(-Math.PI / 2);
  const shimmer = new THREE.Mesh(shimmerGeo, new THREE.MeshBasicMaterial({
    color: 0x3355aa, transparent: true, opacity: 0.05,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  shimmer.position.y = -1.75;
  scene.add(shimmer);

  // [3] Heat shimmer / atmospheric distortion — wavy horizon band
  const shimmerBandGeo = new THREE.PlaneGeometry(500, 12);
  const shimmerBandMat = new THREE.MeshBasicMaterial({
    color: 0x334466, transparent: true, opacity: 0.0,
    depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide,
  });
  const shimmerBand = new THREE.Mesh(shimmerBandGeo, shimmerBandMat);
  shimmerBand.position.set(0, 1.2, -95);
  shimmerBand.rotation.x = Math.PI / 2 - 0.08;
  scene.add(shimmerBand);

  // [2] Dunes with ridge highlight lines
  const dunes = [];
  for (let d = 0; d < 16; d++) {
    const W = 55 + Math.random() * 90;
    const H = 4 + Math.random() * 9;
    const lum = 0.025 + Math.random() * 0.02;

    // Dune body
    const geo  = new THREE.SphereGeometry(W * 0.5, 20, 10);
    const dune = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
      color: new THREE.Color().setHSL(0.62, 0.25, lum * 2.8 + 0.045), // blue-grey tint
    }));
    dune.scale.set(1, H / (W * 0.5), 0.3);
    const dx = (Math.random() - 0.5) * 200;
    const dz = -(50 + Math.random() * 220);
    dune.position.set(dx, -H * 0.45 + 0.8, dz);
    scene.add(dune);

    // [2] Ridge highlight — thin bright line along dune crest
    const ridgePoints = [];
    const ridgeSegs = 18;
    for (let r = 0; r <= ridgeSegs; r++) {
      const rx = dx + (r / ridgeSegs - 0.5) * W * 0.88;
      const ry = -H * 0.45 + 0.8 + H * 0.92; // top of dune
      ridgePoints.push(rx, ry, dz + 0.05);
    }
    const ridgeGeo = new THREE.BufferGeometry();
    ridgeGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(ridgePoints), 3));
    const ridge = new THREE.Line(ridgeGeo, new THREE.LineBasicMaterial({
      color: 0xccddf5, transparent: true, opacity: 0.75,
      blending: THREE.AdditiveBlending,
    }));
    scene.add(ridge);

    dunes.push({ dune, ridge, W, H, dx });
  }

  // [4] Landmark silhouettes — saguaro cacti + rock formations
  const landmarks = [];

  // Saguaro cacti
  for (let c = 0; c < 10; c++) {
    const side  = Math.random() < 0.5 ? -1 : 1;
    const baseX = side * (6 + Math.random() * 28);
    const baseZ = -(15 + Math.random() * 120);
    const trunkH = 3 + Math.random() * 4;
    const trunkR = 0.18 + Math.random() * 0.14;
    const col = new THREE.MeshBasicMaterial({ color: 0x04060e });

    // Main trunk
    const trunk = new THREE.Mesh(new THREE.CylinderGeometry(trunkR * 0.7, trunkR, trunkH, 6), col);
    trunk.position.set(baseX, -1.8 + trunkH / 2, baseZ);
    scene.add(trunk);

    // Arms — 1 or 2 per cactus
    const armCount = Math.floor(Math.random() * 2) + 1;
    for (let a = 0; a < armCount; a++) {
      const armSide = a === 0 ? 1 : -1;
      const armH    = 1.2 + Math.random() * 1.5;
      const armY    = trunkH * (0.45 + Math.random() * 0.25);
      // Horizontal segment
      const armH1 = new THREE.Mesh(new THREE.CylinderGeometry(trunkR * 0.55, trunkR * 0.55, 1.2, 5), col);
      armH1.rotation.z = Math.PI / 2;
      armH1.position.set(baseX + armSide * 0.6, -1.8 + armY, baseZ);
      scene.add(armH1);
      // Vertical segment
      const armV = new THREE.Mesh(new THREE.CylinderGeometry(trunkR * 0.5, trunkR * 0.55, armH, 5), col);
      armV.position.set(baseX + armSide * 1.2, -1.8 + armY + armH / 2, baseZ);
      scene.add(armV);
    }
    landmarks.push({ type: 'cactus', baseZ, trunk });
  }

  // Rock formations
  for (let r = 0; r < 8; r++) {
    const side  = Math.random() < 0.5 ? -1 : 1;
    const baseX = side * (4 + Math.random() * 22);
    const baseZ = -(20 + Math.random() * 130);
    const rockCount = 2 + Math.floor(Math.random() * 3);
    for (let rc = 0; rc < rockCount; rc++) {
      const rW = 0.8 + Math.random() * 2.2;
      const rH = 0.6 + Math.random() * 2.5;
      const geo = new THREE.DodecahedronGeometry(rW * 0.6, 0);
      const rock = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({ color: 0x060810 }));
      rock.scale.set(1, rH / (rW * 0.6), 0.75 + Math.random() * 0.4);
      rock.position.set(baseX + (Math.random() - 0.5) * rW, -1.8 + rH * 0.5, baseZ + (Math.random() - 0.5) * rW);
      rock.rotation.y = Math.random() * Math.PI;
      scene.add(rock);
    }
    landmarks.push({ type: 'rock', baseZ });
  }

  // Shooting stars
  const shootingStars = [];
  const SS_TRAIL = 14;
  for (let s = 0; s < 8; s++) {
    const pos = new Float32Array(SS_TRAIL * 3);
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
    const mat = new THREE.PointsMaterial({
      color: 0xffffff, size: 0.32, transparent: true, opacity: 0,
      blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
    });
    const pts = new THREE.Points(geo, mat);
    scene.add(pts);
    shootingStars.push({ line: pts, pos, SS_TRAIL, active: false, age: 0,
      maxAge: 1.1 + Math.random() * 0.5, nextSpawn: 3 + Math.random() * 10,
      x: 0, y: 0, z: 0, dx: 0, dy: 0 });
  }

  // Dust
  const DUST = 2200;
  const dPos = new Float32Array(DUST * 3);
  const dSpeeds = new Float32Array(DUST);
  for (let i = 0; i < DUST; i++) {
    dPos[i*3]   = (Math.random() - 0.5) * 60;
    dPos[i*3+1] = -1.5 + Math.random() * 1.8;
    dPos[i*3+2] = -(Math.random() * 80);
    dSpeeds[i]  = 0.01 + Math.random() * 0.025;
  }
  const dGeo = new THREE.BufferGeometry();
  dGeo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
  const dustPoints = new THREE.Points(dGeo, new THREE.PointsMaterial({
    color: 0x8899bb, size: 0.07, transparent: true, opacity: 0.3,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(dustPoints);

  md.moon        = moon;
  md.moonGlow    = moonGlow;
  md.moonlight   = moonlight;
  md.horizonMesh = horizonMesh;
  md.shimmer     = shimmer;
  md.shimmerBand = shimmerBand;
  md.starPoints  = starPoints;
  md.sTwink      = sTwink;
  md.STARS       = STARS;
  md.shootingStars = shootingStars;
  md.dustPoints  = dustPoints;
  md.dPos        = dPos; md.dSpeeds = dSpeeds; md.DUST = DUST;
  md.dunes       = dunes;
  md.landmarks   = landmarks;
  md.camZ        = 0;

  // ── Wildlife ─────────────────────────────────────────────────
  md.wildlife = [];
  md.wildlifeTimer = 0;
  md.wildlifeInterval = 2; // first spawn fast, subsequent ones random

  // Force one of each immediately for visibility testing
  spawnWildlife('roadrunner', 0, -5);
  spawnWildlife('quail',      4, -8);
  spawnWildlife('gila',      -4, -11);
}

function updateDesert(t) {
  const { dPos, dSpeeds, DUST } = md;
  const speed = 0.022;
  md.camZ -= speed;
  camera.position.z = md.camZ;
  camera.position.x += (mouseNX * 2 - camera.position.x) * 0.012;
  camera.position.y += (3 - mouseNY * 1.2 - camera.position.y) * 0.012;
  camera.lookAt(camera.position.x * 0.07, 1.5, camera.position.z - 14);

  // Moon tracks with camera
  md.moon.position.x = camera.position.x - 35;
  md.moon.position.z = camera.position.z - 280;
  md.moonGlow.position.copy(md.moon.position);

  // [1] Moonlight grading follows camera
  md.moonlight.position.z   = camera.position.z;
  md.horizonMesh.position.z = camera.position.z - 120;
  md.shimmer.position.z     = camera.position.z;
  md.shimmer.material.opacity = 0.04 + Math.sin(t * 0.25) * 0.015;

  // [1] Moonlight gently breathes
  md.moonlight.material.opacity = 0.32 + Math.sin(t * 0.18) * 0.05;

  // [3] Heat shimmer band ripples at horizon
  md.shimmerBand.position.z = camera.position.z - 95;
  md.shimmerBand.material.opacity = 0.06 + Math.sin(t * 1.8) * 0.04;
  // Subtle vertex wave on shimmer band
  const sbPos = md.shimmerBand.geometry.attributes.position;
  if (sbPos) {
    const arr = sbPos.array;
    for (let v = 0; v < arr.length / 3; v++) {
      arr[v*3+1] = Math.sin(t * 2.2 + arr[v*3] * 0.08) * 0.12;
    }
    sbPos.needsUpdate = true;
  }

  // [2] Dunes + ridge highlights scroll
  md.dunes.forEach(function(d) {
    d.dune.position.z  += speed * 0.28;
    d.ridge.position.z += speed * 0.28;
    if (d.dune.position.z > camera.position.z + 8) {
      d.dune.position.z  -= 240;
      d.ridge.position.z -= 240;
    }
    // Ridge brightens when dune is closer
    const dist = Math.abs(d.dune.position.z - camera.position.z);
    d.ridge.material.opacity = Math.max(0, 0.80 - dist / 160);
  });

  // [4] Landmarks scroll
  md.landmarks.forEach(function(lm) {
    // Scroll all scene objects — cacti trunks and rocks scroll via their mesh position
    // We use the trunk as the anchor for cacti, rock groups just scroll by baseZ offset
    if (lm.trunk) {
      lm.trunk.position.z += speed * 0.3;
      if (lm.trunk.position.z > camera.position.z + 8) {
        const shift = 145;
        lm.trunk.position.z -= shift;
      }
    }
  });

  // [5] Stars twinkle — update opacity per frame based on per-star phase
  const twinkleBase = 0.75;
  let totalOp = 0;
  for (let i = 0; i < md.STARS; i++) {
    // Each star has its own sine phase — not stored per-vertex so we modulate global opacity
    // Use a global soft pulse for performance (full per-star would require shader)
    totalOp += 0.5 + Math.sin(t * (1.1 + md.sTwink[i] * 0.8) + md.sTwink[i]) * 0.5;
  }
  // Modulate overall star field with a compound sine for sparkle feel
  md.starPoints.material.opacity = twinkleBase + Math.sin(t * 2.3) * 0.07 + Math.sin(t * 5.1) * 0.04;

  // Dust drifts in desert wind
  for (let i = 0; i < DUST; i++) {
    dPos[i*3]   += dSpeeds[i] * 0.8 + Math.sin(t * 0.3 + i * 0.5) * 0.003;
    dPos[i*3+2] += speed * 0.5;
    if (dPos[i*3] > camera.position.x + 35) dPos[i*3] = camera.position.x - 35;
    if (dPos[i*3+2] > camera.position.z + 5) {
      dPos[i*3]   = (Math.random() - 0.5) * 60 + camera.position.x;
      dPos[i*3+1] = -1.5 + Math.random() * 1.8;
      dPos[i*3+2] = camera.position.z - 80;
    }
  }
  md.dustPoints.geometry.attributes.position.needsUpdate = true;

  // Shooting stars
  md.shootingStars.forEach(function(s) {
    if (!s.active) {
      s.nextSpawn -= 1/30;
      if (s.nextSpawn <= 0) {
        s.active = true; s.age = 0;
        s.x  = camera.position.x + (Math.random() - 0.5) * 120;
        s.y  = 30 + Math.random() * 40;
        s.z  = camera.position.z - (60 + Math.random() * 150);
        s.dx = (Math.random() - 0.5) * 0.8;
        s.dy = -(0.4 + Math.random() * 0.5);
        s.nextSpawn = 5 + Math.random() * 12;
      }
    } else {
      s.age += 1/30;
      s.x += s.dx; s.y += s.dy;
      const T = s.SS_TRAIL;
      for (let i = 0; i < T; i++) {
        const frac = i / (T - 1);
        s.pos[i*3]   = s.x - s.dx * frac * T;
        s.pos[i*3+1] = s.y - s.dy * frac * T;
        s.pos[i*3+2] = s.z;
      }
      s.line.geometry.attributes.position.needsUpdate = true;
      s.line.material.opacity = Math.sin((s.age / s.maxAge) * Math.PI) * 1.0;
      if (s.age >= s.maxAge) { s.active = false; s.line.material.opacity = 0; }
    }
  });

  // ── Click-spawned shooting stars ───────────────────────────────
  if (md.clickStars) {
    for (let ci = md.clickStars.length - 1; ci >= 0; ci--) {
      const cs  = md.clickStars[ci];
      cs.age   += 1 / 30;
      cs.x     += cs.dx;
      cs.y     += cs.dy;
      const prog = cs.age / cs.maxAge;
      const op   = Math.sin(prog * Math.PI) * 0.95;
      cs.mat.opacity = op;
      for (let i = 0; i < cs.TRAIL; i++) {
        const frac   = i / (cs.TRAIL - 1);
        cs.pos[i*3]   = cs.x - cs.dx * frac * cs.TRAIL * 0.9;
        cs.pos[i*3+1] = cs.y - cs.dy * frac * cs.TRAIL * 0.9;
        cs.pos[i*3+2] = cs.z;
      }
      cs.geo.attributes.position.needsUpdate = true;
      if (cs.age >= cs.maxAge) {
        scene.remove(cs.pts);
        cs.geo.dispose(); cs.mat.dispose();
        md.clickStars.splice(ci, 1);
      }
    }
  }

  // ── Dust devils (click-spawned) ────────────────────────────────
  if (md.dustDevils) {
    for (let di = md.dustDevils.length - 1; di >= 0; di--) {
      const dv   = md.dustDevils[di];
      dv.age    += 1 / 30;
      const prog    = dv.age / dv.maxAge;
      const fadeIn  = Math.min(1, dv.age / 0.5);
      const fadeOut = Math.max(0, 1 - Math.max(0, prog - 0.7) / 0.3);
      dv.pts.material.opacity = 0.72 * fadeIn * fadeOut;
      for (let i = 0; i < dv.N; i++) {
        dv.angles[i]  += 0.07;
        dv.heights[i] += 0.018 * (1 - prog * 0.55);
        if (dv.heights[i] > 5.5) dv.heights[i] = Math.random() * 0.3;
        const r = (0.18 + dv.heights[i] * 0.2) * (1 - prog * 0.22);
        dv.dPos[i*3]   = dv.x + Math.cos(dv.angles[i]) * r;
        dv.dPos[i*3+1] = dv.heights[i];
        dv.dPos[i*3+2] = dv.z + Math.sin(dv.angles[i]) * r;
      }
      dv.pts.geometry.attributes.position.needsUpdate = true;
      dv.pts.position.z += speed * 0.3;
      if (dv.age >= dv.maxAge) {
        scene.remove(dv.pts);
        dv.pts.geometry.dispose();
        dv.pts.material.dispose();
        md.dustDevils.splice(di, 1);
      }
    }
  }

  // ── Wildlife spawner ───────────────────────────────────────────
  md.wildlifeTimer += 1/30;
  if (md.wildlifeTimer >= md.wildlifeInterval) {
    md.wildlifeTimer = 0;
    md.wildlifeInterval = 8 + Math.random() * 10;
    const types = ['roadrunner', 'quail', 'gila', 'coyote', 'javelina'];
    const pick  = types[Math.floor(Math.random() * types.length)];
    spawnWildlife(pick, camera.position.x, camera.position.z);
  }

  // Update active wildlife
  for (let wi = md.wildlife.length - 1; wi >= 0; wi--) {
    const w = md.wildlife[wi];
    w.age += 1/30;

    if (w.type === 'roadrunner') {
      // Fast dart across scene
      w.group.position.x += w.vx;
      w.group.position.z += speed * 0.6;
      // Leg bob — alternate two leg groups
      const bob = Math.sin(w.age * 22) * 0.08;
      if (w.legL) { w.legL.rotation.x =  bob * 1.8; w.legR.rotation.x = -bob * 1.8; }
      // Tail angle bobs with run
      if (w.tail) w.tail.rotation.x = -0.4 + Math.sin(w.age * 22) * 0.12;
      // Head bob
      if (w.head) w.head.position.y = w.headBaseY + Math.abs(Math.sin(w.age * 22)) * 0.06;

    } else if (w.type === 'quail') {
      // Slow covey walk
      w.group.position.x += w.vx * 0.38;
      w.group.position.z += speed * 0.45;
      // Each quail bobs independently
      w.members.forEach(function(m, mi) {
        m.mesh.position.y = m.baseY + Math.abs(Math.sin(w.age * 6 + mi * 1.1)) * 0.055;
        if (m.plume) m.plume.rotation.z = Math.sin(w.age * 6 + mi * 1.1) * 0.18;
      });

    } else if (w.type === 'coyote') {
      // Trot with occasional pause
      if (!w.pausing) {
        w.group.position.x += w.vx * 0.7;
        w.group.position.z += speed * 0.5;
        const trot = Math.sin(w.age * 8);
        if (w.legFL) { w.legFL.rotation.x = trot * 0.5;  w.legBR.rotation.x = trot * 0.5; }
        if (w.legFR) { w.legFR.rotation.x = -trot * 0.5; w.legBL.rotation.x = -trot * 0.5; }
        if (w.tail)  w.tail.rotation.x = -0.3 + Math.sin(w.age * 4) * 0.12;
        // Randomly pause
        if (Math.random() < 0.002) { w.pausing = true; w.pauseAge = 0; }
      } else {
        w.pauseAge += 1/30;
        if (w.pauseAge > 1.5) w.pausing = false;
      }

  } else if (w.type === 'javelina') {
      // Slow group shuffle
      w.group.position.x += w.vx * 0.25;
      w.group.position.z += speed * 0.38;
      w.members.forEach(function(m, mi) {
        m.mesh.position.y = m.baseY + Math.abs(Math.sin(w.age * 4 + mi * 1.3)) * 0.04;
        if (m.snout) m.snout.rotation.y = Math.sin(w.age * 2 + mi) * 0.08;
      });

  } else if (w.type === 'gila') {
      // Slow deliberate crawl
      w.group.position.x += w.vx * 0.12;
      w.group.position.z += speed * 0.3;
      // Body undulate
      if (w.bodyMeshes) {
        w.bodyMeshes.forEach(function(bm, bi) {
          bm.position.y = w.bodyBaseY + Math.sin(w.age * 3.5 + bi * 0.8) * 0.04;
        });
      }
      // Leg shuffle
      if (w.legs) {
        w.legs.forEach(function(leg, li) {
          leg.rotation.x = Math.sin(w.age * 3.5 + li * 1.57) * 0.35;
        });
      }
    }

    // Fade in/out at edges of life
    const fadeIn  = Math.min(1, w.age / 0.4);
    const fadeOut = Math.max(0, 1 - Math.max(0, w.age - (w.maxAge - 1.5)) / 1.5);
    const alpha   = fadeIn * fadeOut;
    w.group.traverse(function(obj) {
      if (obj.material) obj.material.opacity = alpha * w.baseOpacity;
    });

    // Remove when expired or out of view
    if (w.age > w.maxAge || w.group.position.z > camera.position.z + 18) {
      scene.remove(w.group);
      w.group.traverse(function(obj) {
        if (obj.geometry) obj.geometry.dispose();
        if (obj.material) obj.material.dispose();
      });
      md.wildlife.splice(wi, 1);
    }
  }
}

// ── Wildlife builder functions ─────────────────────────────────────────────

function spawnWildlife(type, camX, camZ) {
  const side   = Math.random() < 0.5 ? -1 : 1;
  const startX = camX + side * (10 + Math.random() * 8);
  const startZ = camZ - (6 + Math.random() * 12);
  const vx     = -side * (0.04 + Math.random() * 0.05); // moves toward center then past

  if (type === 'roadrunner') {
    const group = buildRoadrunner();
    group.position.set(startX, 0.2, startZ);
    group.scale.setScalar(0.7 + Math.random() * 0.15);
    group.rotation.y = side > 0 ? Math.PI : 0;
    scene.add(group);
    const w = { type, group, vx, age: 0, maxAge: 14, baseOpacity: 0.88 };
    // Grab leg/tail/head refs from group children
    w.legL = group.getObjectByName('legL');
    w.legR = group.getObjectByName('legR');
    w.tail = group.getObjectByName('tail');
    w.head = group.getObjectByName('head');
    w.headBaseY = w.head ? w.head.position.y : 0;
    md.wildlife.push(w);

  } else if (type === 'quail') {
    const count   = 4 + Math.floor(Math.random() * 4);
    const group   = new THREE.Group();
    const members = [];
    for (let q = 0; q < count; q++) {
      const qMesh  = buildQuail();
      const spread = (Math.random() - 0.5) * 2.2;
      const zOff   = (Math.random() - 0.5) * 1.4;
      qMesh.position.set(spread, 0, zOff);
      qMesh.scale.setScalar(0.45 + Math.random() * 0.08);
      qMesh.rotation.y = side > 0 ? Math.PI : 0;
      group.add(qMesh);
      members.push({ mesh: qMesh, baseY: 0, plume: qMesh.getObjectByName('plume') });
    }
    group.position.set(startX, 0.2, startZ);
    scene.add(group);
    md.wildlife.push({ type, group, vx, age: 0, maxAge: 18, baseOpacity: 0.82, members });

  } else if (type === 'coyote') {
    const group = buildCoyote();
    group.position.set(startX, 0.2, startZ);
    group.scale.setScalar(0.55 + Math.random() * 0.1);
    group.rotation.y = side > 0 ? Math.PI : 0;
    scene.add(group);
    const w = { type, group, vx, age: 0, maxAge: 20, baseOpacity: 0.95, pausing: false, pauseAge: 0 };
    w.legFL = group.getObjectByName('legFL');
    w.legFR = group.getObjectByName('legFR');
    w.legBL = group.getObjectByName('legBL');
    w.legBR = group.getObjectByName('legBR');
    w.tail  = group.getObjectByName('tail');
    md.wildlife.push(w);

  } else if (type === 'javelina') {
    const count   = 2 + Math.floor(Math.random() * 2);
    const group   = new THREE.Group();
    const members = [];
    for (let jv = 0; jv < count; jv++) {
      const jMesh = buildJavelina();
      jMesh.position.set((Math.random() - 0.5) * 2.5, 0, (Math.random() - 0.5) * 1.2);
      jMesh.scale.setScalar(0.48 + Math.random() * 0.08);
      jMesh.rotation.y = side > 0 ? Math.PI : 0;
      group.add(jMesh);
      members.push({ mesh: jMesh, baseY: 0, snout: jMesh.getObjectByName('snout') });
    }
    group.position.set(startX, 0.2, startZ);
    scene.add(group);
    md.wildlife.push({ type, group, vx, age: 0, maxAge: 20, baseOpacity: 0.92, members });

  } else if (type === 'gila') {
    const group = new THREE.Group();
    const result = buildGila(group);
    group.position.set(startX, 0.1, startZ);
    group.scale.setScalar(0.65 + Math.random() * 0.1);
    group.rotation.y = side > 0 ? Math.PI : 0;
    scene.add(group);
    md.wildlife.push({ type, group, vx, age: 0, maxAge: 22, baseOpacity: 0.85,
      bodyMeshes: result.bodyMeshes, bodyBaseY: result.bodyBaseY, legs: result.legs });
  }
}

function buildRoadrunner() {
  const col = new THREE.MeshBasicMaterial({ color: 0x7788aa, transparent: true, opacity: 1.0, depthWrite: false });
  const g = new THREE.Group();

  // Body — elongated ellipsoid
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.28, 8, 6), col.clone());
  body.scale.set(1.7, 0.7, 0.75);
  body.position.set(0, 0.28, 0);
  g.add(body);

  // Neck
  const neck = new THREE.Mesh(new THREE.CylinderGeometry(0.07, 0.1, 0.22, 6), col.clone());
  neck.position.set(0.32, 0.44, 0);
  neck.rotation.z = -0.5;
  g.add(neck);

  // Head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.13, 8, 6), col.clone());
  head.position.set(0.44, 0.56, 0);
  head.name = 'head';
  g.add(head);

  // Beak
  const beak = new THREE.Mesh(new THREE.CylinderGeometry(0.02, 0.01, 0.2, 5), col.clone());
  beak.rotation.z = -Math.PI / 2;
  beak.position.set(0.62, 0.57, 0);
  g.add(beak);

  // Crest
  const crest = new THREE.Mesh(new THREE.ConeGeometry(0.04, 0.14, 4), col.clone());
  crest.position.set(0.38, 0.70, 0);
  crest.rotation.z = -0.3;
  g.add(crest);

  // Tail — angled upward
  const tail = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.02, 0.38, 5), col.clone());
  tail.rotation.z = Math.PI / 2 - 0.4;
  tail.position.set(-0.48, 0.42, 0);
  tail.name = 'tail';
  g.add(tail);

  // Legs
  const legL = new THREE.Group(); legL.name = 'legL';
  const legR = new THREE.Group(); legR.name = 'legR';
  [[legL, -0.06], [legR, 0.06]].forEach(function(pair) {
    const leg = pair[0], zo = pair[1];
    const upper = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 0.2, 5), col.clone());
    upper.position.set(0.05, -0.1, zo);
    leg.add(upper);
    const lower = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.02, 0.18, 5), col.clone());
    lower.position.set(0.05, -0.28, zo);
    leg.add(lower);
    leg.position.set(-0.02, 0.18, zo);
    g.add(leg);
  });
  g.add(legL); g.add(legR);

  return g;
}

function buildQuail() {
  const col = new THREE.MeshBasicMaterial({ color: 0x6677aa, transparent: true, opacity: 1.0, depthWrite: false });
  const g   = new THREE.Group();

  // Round body
  const body = new THREE.Mesh(new THREE.SphereGeometry(0.32, 8, 6), col.clone());
  body.scale.set(1, 0.78, 0.8);
  body.position.set(0, 0.32, 0);
  g.add(body);

  // Small head
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.15, 7, 6), col.clone());
  head.position.set(0.26, 0.56, 0);
  g.add(head);

  // Beak
  const beak = new THREE.Mesh(new THREE.ConeGeometry(0.025, 0.1, 4), col.clone());
  beak.rotation.z = -Math.PI / 2;
  beak.position.set(0.38, 0.56, 0);
  g.add(beak);

  // Topknot plume — teardrop shaped
  const plume = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 5), col.clone());
  plume.scale.set(0.6, 1.6, 0.6);
  plume.position.set(0.18, 0.76, 0);
  plume.name = 'plume';
  g.add(plume);

  // Stubby tail
  const tail = new THREE.Mesh(new THREE.ConeGeometry(0.06, 0.14, 5), col.clone());
  tail.rotation.z = Math.PI / 2 + 0.3;
  tail.position.set(-0.3, 0.3, 0);
  g.add(tail);

  // Tiny legs
  [[-0.05], [0.05]].forEach(function(pair) {
    const zo = pair[0];
    const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, 0.22, 5), col.clone());
    leg.position.set(0, 0.11, zo);
    g.add(leg);
  });

  return g;
}

function buildGila(g) {
  const col = new THREE.MeshBasicMaterial({ color: 0x556688, transparent: true, opacity: 1.0, depthWrite: false });
  const bodyMeshes = [];
  const legs = [];
  const SEG = 5;

  // Segmented body
  for (let s = 0; s < SEG; s++) {
    const r   = s === 0 ? 0.08 : (s === SEG-1 ? 0.06 : 0.12 - s * 0.008);
    const seg = new THREE.Mesh(new THREE.SphereGeometry(r, 7, 5), col.clone());
    seg.scale.set(1.6, 0.55, 0.9);
    seg.position.set((s - SEG/2 + 0.5) * 0.22, 0.08, 0);
    g.add(seg);
    bodyMeshes.push(seg);
  }

  // Head (first segment extra)
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.13, 7, 5), col.clone());
  head.scale.set(1.4, 0.7, 0.85);
  head.position.set(SEG/2 * 0.22 - 0.05, 0.09, 0);
  g.add(head);

  // Snout
  const snout = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.03, 0.1, 5), col.clone());
  snout.rotation.z = Math.PI / 2;
  snout.position.set(SEG/2 * 0.22 + 0.1, 0.09, 0);
  g.add(snout);

  // Thick tail
  const tail = new THREE.Mesh(new THREE.SphereGeometry(0.1, 6, 5), col.clone());
  tail.scale.set(1.8, 0.5, 0.7);
  tail.position.set(-(SEG/2) * 0.22 - 0.18, 0.08, 0);
  g.add(tail);

  // 4 stubby legs
  const legXs = [-0.28, -0.06, 0.16, 0.38];
  const legSides = [-1, 1];
  legXs.forEach(function(lx) {
    legSides.forEach(function(ls) {
      const leg = new THREE.Mesh(new THREE.CylinderGeometry(0.025, 0.02, 0.12, 5), col.clone());
      leg.rotation.z = ls * 0.6;
      leg.position.set(lx, 0.02, ls * 0.14);
      g.add(leg);
      legs.push(leg);
    });
  });

  return { bodyMeshes, bodyBaseY: 0.08, legs };
}

// MODE 10 — THUNDERSTORM

function initStorm() {
  camera.position.set(0, 4, 0);
  camera.rotation.set(0, 0, 0);
  scene.fog = new THREE.FogExp2(0x010508, 0.010);
  renderer.setClearColor(0x010508, 1);

  // Background sphere
  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(600,16,16),
    new THREE.MeshBasicMaterial({ color: 0x000205, side: THREE.BackSide })
  ));

  // Ground
  const groundGeo = new THREE.PlaneGeometry(600,600); groundGeo.rotateX(-Math.PI/2);
  scene.add(new THREE.Mesh(groundGeo, new THREE.MeshBasicMaterial({ color: 0x01020c })));

  // Distant hill silhouettes
  for (let h = 0; h < 8; h++) {
    const W=80+Math.random()*120, H=5+Math.random()*12;
    const mesh = new THREE.Mesh(
      new THREE.SphereGeometry(W*0.5,16,8),
      new THREE.MeshBasicMaterial({ color: 0x000108 })
    );
    mesh.scale.set(1, H/(W*0.5), 0.22);
    mesh.position.set((Math.random()-0.5)*300, -H*0.48+1.5, -(120+Math.random()*280));
    scene.add(mesh);
  }

  // [5] Ground puddle reflections — 5 shimmering planes at ground level
  const puddles = [];
  for (let p = 0; p < 5; p++) {
    const pw = 4+Math.random()*8, pd = 2+Math.random()*4;
    const pGeo = new THREE.PlaneGeometry(pw, pd);
    pGeo.rotateX(-Math.PI/2);
    const pMat = new THREE.MeshBasicMaterial({
      color: 0x334466, transparent: true, opacity: 0.0,
      depthWrite: false, blending: THREE.AdditiveBlending,
    });
    const pMesh = new THREE.Mesh(pGeo, pMat);
    pMesh.position.set(
      (Math.random()-0.5)*30,
      0.05,
      -(3+Math.random()*35)
    );
    scene.add(pMesh);
    puddles.push({ mesh: pMesh, baseX: pMesh.position.x, baseZ: pMesh.position.z });
  }

  // [1] Volumetric cloud layers — 3 depth layers with different sizes/speeds/opacity
  const clouds = [];
  const cloudLayers = [
    { count:10, yRange:[28,40], zRange:[150,350], wScale:2.2, hScale:1.8, baseOp:0.55, speed:0.004, lum:0.035 }, // far — huge, diffuse
    { count:12, yRange:[18,30], zRange:[60, 150], wScale:1.4, hScale:1.2, baseOp:0.72, speed:0.008, lum:0.048 }, // mid
    { count: 8, yRange:[10,22], zRange:[15,  60], wScale:0.9, hScale:0.8, baseOp:0.82, speed:0.013, lum:0.060 }, // near — darker, sharper
  ];

  cloudLayers.forEach(function(layer, li) {
    for (let c = 0; c < layer.count; c++) {
      const W = (35+Math.random()*55)*layer.wScale;
      const H = (6+Math.random()*14)*layer.hScale;
      // Each cloud is 3 overlapping planes for volume
      for (let sub = 0; sub < 3; sub++) {
        const geo = new THREE.PlaneGeometry(W*(0.8+sub*0.15), H*(0.7+sub*0.2), 6, 6);
        const lum = layer.lum + sub*0.01 + Math.random()*0.015;
        const mat = new THREE.MeshBasicMaterial({
          color: new THREE.Color().setHSL(0.60, 0.18, lum),
          transparent: true, opacity: layer.baseOp - sub*0.12,
          side: THREE.DoubleSide, depthWrite: false,
        });
        const mesh = new THREE.Mesh(geo, mat);
        const zMin=layer.zRange[0], zMax=layer.zRange[1];
        mesh.position.set(
          (Math.random()-0.5)*180,
          layer.yRange[0]+Math.random()*(layer.yRange[1]-layer.yRange[0]) + sub*1.5,
          -(zMin+Math.random()*(zMax-zMin))
        );
        mesh.rotation.x = (Math.random()-0.5)*0.25 + sub*0.08;
        mesh.rotation.y = (Math.random()-0.5)*0.5;
        scene.add(mesh);
        clouds.push({ mesh, speed: layer.speed*(0.8+Math.random()*0.4), phase: Math.random()*Math.PI*2, layer: li, baseOp: layer.baseOp - sub*0.12 });
      }
    }
  });

  // [2] Close lightning bolts — brighter, faster flicker, secondary branch
  const bolts = [];
  for (let b = 0; b < 6; b++) {
    const SEG=14;
    const bPos=new Float32Array(SEG*2*3);
    const geo=new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(bPos, 3));
    const line=new THREE.LineSegments(geo, new THREE.LineBasicMaterial({
      color: 0xddeeff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending,
    }));
    scene.add(line);
    // Branch bolt
    const branchPos=new Float32Array(6*2*3);
    const branchGeo=new THREE.BufferGeometry();
    branchGeo.setAttribute('position', new THREE.BufferAttribute(branchPos, 3));
    const branch=new THREE.LineSegments(branchGeo, new THREE.LineBasicMaterial({
      color: 0xaabbdd, transparent: true, opacity: 0, blending: THREE.AdditiveBlending,
    }));
    scene.add(branch);
    bolts.push({ line, bPos, SEG, branch, branchPos,
      active:false, age:0, maxAge:0.22+Math.random()*0.1,
      nextSpawn: 1.5+Math.random()*5 });
  }

  // [4] Distant horizon lightning — cloud glow only, no bolt visible
  const horizonGlows = [];
  for (let hg = 0; hg < 4; hg++) {
    const gMesh = new THREE.Mesh(
      new THREE.SphereGeometry(55+Math.random()*30, 10, 8),
      new THREE.MeshBasicMaterial({
        color: new THREE.Color().setHSL(0.60+Math.random()*0.08, 0.6, 0.5),
        transparent: true, opacity: 0,
        blending: THREE.AdditiveBlending, depthWrite: false,
      })
    );
    gMesh.position.set(
      (Math.random()-0.5)*200,
      25+Math.random()*20,
      -(180+Math.random()*220)
    );
    scene.add(gMesh);
    horizonGlows.push({
      mesh: gMesh, intensity: 0,
      nextFlash: 3+Math.random()*8,
      baseX: gMesh.position.x, baseZ: gMesh.position.z,
    });
  }

  // Main cloud glow (near lightning illumination)
  const cloudGlow = new THREE.Mesh(
    new THREE.SphereGeometry(60,12,10),
    new THREE.MeshBasicMaterial({ color: 0x8899ff, transparent: true, opacity: 0, blending: THREE.AdditiveBlending, depthWrite: false })
  );
  cloudGlow.position.set(0,25,-80);
  scene.add(cloudGlow);

  // [3] Rain — larger pool, wind angle stored per-drop for squall variation
  const RAIN = 5000;
  const rPos = new Float32Array(RAIN*2*3);
  const rSpd = new Float32Array(RAIN);
  const rLen = new Float32Array(RAIN);
  for (let i = 0; i < RAIN; i++) {
    const x=(Math.random()-0.5)*80, y=(Math.random()-0.5)*35, z=-(Math.random()*90);
    const len=0.25+Math.random()*0.55;
    rPos[i*6]=x; rPos[i*6+1]=y;     rPos[i*6+2]=z;
    rPos[i*6+3]=x; rPos[i*6+4]=y-len; rPos[i*6+5]=z;
    rSpd[i]=0.20+Math.random()*0.25;
    rLen[i]=len;
  }
  const rGeo=new THREE.BufferGeometry();
  rGeo.setAttribute('position', new THREE.BufferAttribute(rPos, 3));
  const rain=new THREE.LineSegments(rGeo, new THREE.LineBasicMaterial({
    color: 0x7788aa, transparent: true, opacity: 0.38, blending: THREE.AdditiveBlending,
  }));
  scene.add(rain);

  // Debris
  const DEBRIS=600;
  const debPos=new Float32Array(DEBRIS*3), debSpd=new Float32Array(DEBRIS);
  for (let i = 0; i < DEBRIS; i++) {
    debPos[i*3]=(Math.random()-0.5)*60; debPos[i*3+1]=1+Math.random()*10; debPos[i*3+2]=-(Math.random()*70);
    debSpd[i]=0.03+Math.random()*0.06;
  }
  const debGeo=new THREE.BufferGeometry();
  debGeo.setAttribute('position', new THREE.BufferAttribute(debPos, 3));
  const debris=new THREE.Points(debGeo, new THREE.PointsMaterial({
    color: 0x445566, size: 0.08, transparent: true, opacity: 0.55, depthWrite: false,
  }));
  scene.add(debris);

  md.clouds=clouds; md.cloudGlow=cloudGlow;
  md.puddles=puddles;
  md.horizonGlows=horizonGlows;
  md.rain=rain; md.rPos=rPos; md.rSpd=rSpd; md.rLen=rLen; md.RAIN=RAIN;
  md.bolts=bolts;
  md.debris=debris; md.debPos=debPos; md.debSpd=debSpd; md.DEBRIS=DEBRIS;
  md.flashIntensity=0;
  // [3] Squall state
  md.squallIntensity=1.0; md.squallTimer=0; md.squallInterval=8+Math.random()*12;
  md.camZ=0;
}

function updateStorm(t) {
  const { rPos, rSpd, rLen, RAIN, debPos, debSpd, DEBRIS } = md;
  const speed = 0.025;
  md.camZ -= speed;
  camera.position.z = md.camZ;
  camera.position.x += (mouseNX*2 - camera.position.x)*0.01;
  camera.position.y += (4-mouseNY*1.5 - camera.position.y)*0.01;
  camera.lookAt(camera.position.x*0.05, 2, camera.position.z-12);

  // [2] Flash decay — faster decay, secondary flicker
  md.flashIntensity *= 0.78;
  const flickerBoost = md.flashIntensity > 0.1 ? Math.random() * md.flashIntensity * 0.3 : 0;
  const fi = Math.min(1, md.flashIntensity + flickerBoost);
  renderer.setClearColor(
    new THREE.Color(0x010508).lerp(new THREE.Color(0x4455bb), fi * 0.28), 1
  );
  md.cloudGlow.position.z = camera.position.z - 80;
  md.cloudGlow.material.opacity = fi * 0.35;

  // [5] Puddle reflections brighten with flash
  md.puddles.forEach(function(p) {
    p.mesh.position.z = p.baseZ + camera.position.z;
    p.mesh.material.opacity = 0.06 + fi * 0.45 + Math.sin(t*1.8+p.baseX)*0.03;
    p.mesh.material.color.setHSL(0.60, 0.5, 0.15 + fi * 0.35);
  });

  // [1] Volumetric clouds — scroll with parallax by layer
  md.clouds.forEach(function(c) {
    const layerSpeed = c.speed * (1 + c.layer * 0.5);
    c.mesh.position.x += layerSpeed;
    c.mesh.position.z += speed * (0.18 + c.layer * 0.08);
    const wrap = 250 - c.layer * 60;
    if (c.mesh.position.z > camera.position.z + 14) c.mesh.position.z -= wrap;
    // [2] Flash illuminates clouds — brighter near lightning strike
    const flashLift = fi * 0.08;
    c.mesh.material.opacity = c.baseOp + flashLift + Math.sin(t*0.12+c.phase)*0.06;
  });

  // [2] Lightning bolts — brighter, secondary branch, stronger flash
  md.bolts.forEach(function(b) {
    if (!b.active) {
      b.nextSpawn -= 1/30;
      if (b.nextSpawn <= 0) {
        b.active=true; b.age=0;
        const startX=camera.position.x+(Math.random()-0.5)*70;
        const startZ=camera.position.z-(25+Math.random()*80);
        let cx=startX, cy=30, cz=startZ;
        // Main bolt — more jagged segments
        for (let s=0; s<b.SEG; s++) {
          const nx=cx+(Math.random()-0.5)*5, ny=cy-(30/b.SEG)*(1+Math.random()*0.6);
          b.bPos[s*6]=cx; b.bPos[s*6+1]=cy; b.bPos[s*6+2]=cz;
          b.bPos[s*6+3]=nx; b.bPos[s*6+4]=ny; b.bPos[s*6+5]=cz;
          cx=nx; cy=ny;
        }
        b.line.geometry.attributes.position.needsUpdate=true;
        b.line.material.color.setHSL(0.60+Math.random()*0.08, 0.4, 0.92);

        // Branch off midpoint
        const midSeg=Math.floor(b.SEG*0.4);
        const bx=b.bPos[midSeg*6+3], by=b.bPos[midSeg*6+4];
        let bx2=bx, by2=by;
        for (let s=0; s<6; s++) {
          const nx2=bx2+(Math.random()-0.5)*4, ny2=by2-(12/6)*(1+Math.random()*0.5);
          b.branchPos[s*6]=bx2; b.branchPos[s*6+1]=by2; b.branchPos[s*6+2]=cz;
          b.branchPos[s*6+3]=nx2; b.branchPos[s*6+4]=ny2; b.branchPos[s*6+5]=cz;
          bx2=nx2; by2=ny2;
        }
        b.branch.geometry.attributes.position.needsUpdate=true;

        b.nextSpawn=stormHeavy ? 2+Math.random()*6 : 12+Math.random()*18;
        // Strong flash with secondary pulse
        md.flashIntensity=0.9+Math.random()*0.1;
        md.cloudGlow.position.set(startX, 25, startZ);
        setTimeout(function() { md.flashIntensity=Math.max(md.flashIntensity, 0.5+Math.random()*0.3); }, 80);
      }
    } else {
      b.age += 1/30;
      const flicker=(Math.sin(b.age*90)>0?1:0.2);
      const fade=1-b.age/b.maxAge;
      b.line.material.opacity   = flicker*fade*1.0;
      b.branch.material.opacity = flicker*fade*0.55;
      if (b.age>=b.maxAge) {
        b.active=false;
        b.line.material.opacity=0;
        b.branch.material.opacity=0;
      }
    }
  });

  // [4] Distant horizon lightning — internal cloud glow, no bolt
  md.horizonGlows.forEach(function(hg) {
    if (hg.intensity > 0) {
      hg.intensity *= 0.88;
      hg.mesh.material.opacity = hg.intensity * 0.18;
      hg.mesh.position.z += speed * 0.15;
    } else {
      hg.nextFlash -= 1/30;
      if (hg.nextFlash <= 0) {
        hg.intensity   = 0.7+Math.random()*0.3;
        hg.nextFlash   = stormHeavy ? 4+Math.random()*10 : 18+Math.random()*22;
        hg.mesh.position.z = hg.baseZ + camera.position.z;
        hg.mesh.position.x = hg.baseX + camera.position.x;
        // Secondary flicker after short delay
        setTimeout(function() { hg.intensity = Math.max(hg.intensity, 0.4+Math.random()*0.3); }, 120);
      }
    }
    if (hg.mesh.position.z > camera.position.z+12) hg.mesh.position.z = camera.position.z-350;
  });

  // [3] Squall system — rain intensity and angle pulse
  md.squallTimer += 1/30;
  // Hold-click intensifies squall on demand
  if (md.squallHeld) md.squallIntensity = Math.min(2.5, md.squallIntensity + 0.025);
  if (md.squallTimer > md.squallInterval) {
    md.squallTimer    = 0;
    md.squallInterval = 7+Math.random()*12;
    md.squallIntensity = 1.5+Math.random()*1.0; // burst of intensity
    setTimeout(function() { md.squallIntensity = 0.6+Math.random()*0.5; }, 2500); // ease back
    setTimeout(function() { md.squallIntensity = 1.0; }, 5500);
  }
  const windAngle  = 0.012 * md.squallIntensity;
  const rainOpacity= 0.30 * md.squallIntensity;
  md.rain.material.opacity = Math.min(0.75, rainOpacity + fi*0.12);

  for (let i=0; i<RAIN; i++) {
    const spd = rSpd[i] * md.squallIntensity;
    rPos[i*6+1] -= spd; rPos[i*6+4] -= spd;
    rPos[i*6]   += windAngle; rPos[i*6+3] += windAngle;
    rPos[i*6+2] += speed*0.6; rPos[i*6+5] += speed*0.6;
    if (rPos[i*6+1] < camera.position.y-20 || rPos[i*6+2] > camera.position.z+6) {
      const nx=camera.position.x+(Math.random()-0.5)*80;
      const ny=camera.position.y+16;
      const nz=camera.position.z-Math.random()*90;
      rPos[i*6]=nx; rPos[i*6+1]=ny; rPos[i*6+2]=nz;
      rPos[i*6+3]=nx; rPos[i*6+4]=ny-rLen[i]; rPos[i*6+5]=nz;
    }
  }
  md.rain.geometry.attributes.position.needsUpdate=true;

  for (let i=0; i<DEBRIS; i++) {
    debPos[i*3]  +=debSpd[i]+Math.sin(t*0.4+i*0.9)*0.008;
    debPos[i*3+1]+=Math.sin(t*0.3+i*1.2)*0.008;
    debPos[i*3+2]+=speed*0.5;
    if (debPos[i*3]>camera.position.x+40 || debPos[i*3+2]>camera.position.z+6) {
      debPos[i*3]=camera.position.x-40; debPos[i*3+1]=1+Math.random()*10; debPos[i*3+2]=camera.position.z-70;
    }
  }
  md.debris.geometry.attributes.position.needsUpdate=true;
}

  // Tail — long, drooping slightly

  tail.rotation.z = Math.PI / 2 - 0.5;
  tail.position.set(-0.65, 0.28, 0);

  const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.07, 6, 5), col());
  tuft.position.set(-0.92, 0.08, 0);
  g.add(tuft);

  // Four legs
  const legDefs = [
    { name: 'legFL', x:  0.28, z: -0.1 },
    { name: 'legFR', x:  0.28, z:  0.1 },
    { name: 'legBL', x: -0.28, z: -0.1 },
    { name: 'legBR', x: -0.28, z:  0.1 },

function buildJavelina() {

  // Small ears
  [[-0.08], [0.08]].forEach(function(pair) {

function initMurmuration() {
  camera.position.set(0, 8, 42);
  camera.lookAt(0, 12, 0);
  renderer.setClearColor(0x060818, 1);

  // ── Desert Night background (static) ─────────────────────────

  scene.add(new THREE.Mesh(
    new THREE.SphereGeometry(600, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0x00000c, side: THREE.BackSide })
  ));

  const STARS = 7000;
  const sPos   = new Float32Array(STARS * 3);
  const sCol   = new Float32Array(STARS * 3);
  const sTwink = new Float32Array(STARS);
  for (let i = 0; i < STARS; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 280 + Math.random() * 100;
    sPos[i*3]   = r * Math.sin(phi) * Math.cos(theta);
    sPos[i*3+1] = Math.abs(r * Math.sin(phi) * Math.sin(theta)) + 2;
    sPos[i*3+2] = r * Math.cos(phi);
    const warm  = Math.random() < 0.3;
    const col   = new THREE.Color().setHSL(warm ? 0.1 : 0.62, 0.3, 0.7 + Math.random() * 0.3);
    sCol[i*3] = col.r; sCol[i*3+1] = col.g; sCol[i*3+2] = col.b;
    sTwink[i] = Math.random() * Math.PI * 2;
  }
  const sGeo = new THREE.BufferGeometry();
  sGeo.setAttribute('position', new THREE.BufferAttribute(sPos, 3));
  sGeo.setAttribute('color',    new THREE.BufferAttribute(sCol, 3));
  const starPoints = new THREE.Points(sGeo, new THREE.PointsMaterial({
    vertexColors: true, size: 0.45, transparent: true, opacity: 0.85,
  }));
  scene.add(starPoints);

  const moon = new THREE.Mesh(
    new THREE.SphereGeometry(4.5, 24, 24),
    new THREE.MeshBasicMaterial({ color: 0xf0eacc, transparent: true, opacity: 0.95 })
  );
  moon.position.set(-35, 55, -280);
  scene.add(moon);
  const moonGlow = new THREE.Mesh(
    new THREE.SphereGeometry(9, 16, 16),
    new THREE.MeshBasicMaterial({ color: 0xddeeff, transparent: true, opacity: 0.07,
      blending: THREE.AdditiveBlending, depthWrite: false })
  );
  moonGlow.position.copy(moon.position);
  scene.add(moonGlow);

  const mlGeo = new THREE.PlaneGeometry(600, 600);
  mlGeo.rotateX(-Math.PI / 2);
  const moonlight = new THREE.Mesh(mlGeo, new THREE.MeshBasicMaterial({
    color: 0x1a2a5a, transparent: true, opacity: 0.38,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  moonlight.position.y = 0.5;
  scene.add(moonlight);

  const horizonMesh = new THREE.Mesh(
    new THREE.PlaneGeometry(600, 80),
    new THREE.MeshBasicMaterial({ color: 0x223366, transparent: true, opacity: 0.32,
      depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.DoubleSide })
  );
  horizonMesh.position.set(0, 2, -120);
  horizonMesh.rotation.x = Math.PI / 2 - 0.18;
  scene.add(horizonMesh);

  const gGeo = new THREE.PlaneGeometry(600, 600);
  gGeo.rotateX(-Math.PI / 2);
  scene.add(new THREE.Mesh(gGeo, new THREE.MeshBasicMaterial({ color: 0x141828 })));

  const shGeo = new THREE.PlaneGeometry(400, 400);
  shGeo.rotateX(-Math.PI / 2);
  const shimmer = new THREE.Mesh(shGeo, new THREE.MeshBasicMaterial({
    color: 0x3355aa, transparent: true, opacity: 0.05,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  shimmer.position.y = -1.75;
  scene.add(shimmer);

  for (let d = 0; d < 16; d++) {
    const W   = 55 + Math.random() * 90;
    const H   = 4  + Math.random() * 9;
    const lum = 0.025 + Math.random() * 0.02;
    const dune = new THREE.Mesh(
      new THREE.SphereGeometry(W * 0.5, 20, 10),
      new THREE.MeshBasicMaterial({ color: new THREE.Color().setHSL(0.62, 0.25, lum*2.8+0.045) })
    );
    dune.scale.set(1, H/(W*0.5), 0.3);
    const dx = (Math.random() - 0.5) * 200;
    const dz = -(50 + Math.random() * 220);
    dune.position.set(dx, -H*0.45+0.8, dz);
    scene.add(dune);
    const rPts = [];
    for (let r = 0; r <= 18; r++) rPts.push(dx+(r/18-0.5)*W*0.88, -H*0.45+0.8+H*0.92, dz+0.05);
    const rGeo = new THREE.BufferGeometry();
    rGeo.setAttribute('position', new THREE.BufferAttribute(new Float32Array(rPts), 3));
    scene.add(new THREE.Line(rGeo, new THREE.LineBasicMaterial({
      color: 0xccddf5, transparent: true, opacity: 0.75, blending: THREE.AdditiveBlending,
    })));
  }

  for (let c = 0; c < 10; c++) {
    const side   = Math.random() < 0.5 ? -1 : 1;
    const baseX  = side * (6 + Math.random() * 28);
    const baseZ  = -(15 + Math.random() * 120);
    const trunkH = 3 + Math.random() * 4;
    const trunkR = 0.18 + Math.random() * 0.14;
    const col    = new THREE.MeshBasicMaterial({ color: 0x04060e });
    const trunk  = new THREE.Mesh(new THREE.CylinderGeometry(trunkR*0.7, trunkR, trunkH, 6), col);
    trunk.position.set(baseX, -1.8+trunkH/2, baseZ);
    scene.add(trunk);
    const armCount = Math.floor(Math.random() * 2) + 1;
    for (let a = 0; a < armCount; a++) {
      const armSide = a === 0 ? 1 : -1;
      const armH    = 1.2 + Math.random() * 1.5;
      const armY    = trunkH * (0.45 + Math.random() * 0.25);
      const ah = new THREE.Mesh(new THREE.CylinderGeometry(trunkR*0.55, trunkR*0.55, 1.2, 5), col);
      ah.rotation.z = Math.PI / 2;
      ah.position.set(baseX+armSide*0.6, -1.8+armY, baseZ);
      scene.add(ah);
      const av = new THREE.Mesh(new THREE.CylinderGeometry(trunkR*0.5, trunkR*0.55, armH, 5), col);
      av.position.set(baseX+armSide*1.2, -1.8+armY+armH/2, baseZ);
      scene.add(av);
    }
  }

  for (let r = 0; r < 8; r++) {
    const side  = Math.random() < 0.5 ? -1 : 1;
    const baseX = side * (4 + Math.random() * 22);
    const baseZ = -(20 + Math.random() * 130);
    for (let rc = 0; rc < 2+Math.floor(Math.random()*3); rc++) {
      const rW = 0.8+Math.random()*2.2, rH = 0.6+Math.random()*2.5;
      const rock = new THREE.Mesh(new THREE.DodecahedronGeometry(rW*0.6,0),
        new THREE.MeshBasicMaterial({ color: 0x060810 }));
      rock.scale.set(1, rH/(rW*0.6), 0.75+Math.random()*0.4);
      rock.position.set(baseX+(Math.random()-0.5)*rW, -1.8+rH*0.5, baseZ+(Math.random()-0.5)*rW);
      rock.rotation.y = Math.random()*Math.PI;
      scene.add(rock);
    }
  }

  md.moon        = moon;
  md.moonGlow    = moonGlow;
  md.moonlight   = moonlight;
  md.horizonMesh = horizonMesh;
  md.shimmer     = shimmer;
  md.starPoints  = starPoints;
  md.sTwink      = sTwink;
  md.STARS       = STARS;

  // ── Boids ─────────────────────────────────────────────────────
  const N    = 3500;
  const pos  = new Float32Array(N * 3);
  const vel  = new Float32Array(N * 3);

  for (let i = 0; i < N; i++) {
    const theta = Math.random() * Math.PI * 2;
    const phi   = Math.acos(2 * Math.random() - 1);
    const r     = 5 + Math.random() * 9;
    pos[i*3]   = Math.sin(phi) * Math.cos(theta) * r * 2.2;
    pos[i*3+1] = 10 + Math.sin(phi) * Math.sin(theta) * r * 0.9;
    pos[i*3+2] = Math.cos(phi) * r * 1.4;
    const spd  = 0.06 + Math.random() * 0.04;
    const a    = Math.random() * Math.PI * 2;
    vel[i*3]   = Math.cos(a) * spd;
    vel[i*3+1] = (Math.random() - 0.5) * 0.02;
    vel[i*3+2] = Math.sin(a) * spd * 0.5;
  }

  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xc8d8ff, size: 0.22, transparent: true, opacity: 0.82,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  });
  const flock = new THREE.Points(geo, mat);
  scene.add(flock);

  md.flock = flock; md.pos = pos; md.vel = vel; md.N = N;
  md.hawks = [];
  md.flockHeading = 0;
  md.camAngle = 0;
}

function updateMurmuration(t) {
  const { pos, vel, N } = md;

  // Only recompute Boids every other frame — halves CPU cost
  md.boidsFrame = (md.boidsFrame || 0) + 1;
  const doBoids = (md.boidsFrame % 2 === 0);

  // Slow collective heading drift
  md.flockHeading += 0.0008;
  const hx = Math.cos(md.flockHeading) * 0.00045;
  const hz = Math.sin(md.flockHeading) * 0.00045;

  if (doBoids) {
    // ── Fast integer-key spatial hash ─────────────────────────────
    const CELL  = 3.8;
    const INV   = 1 / CELL;
    const P1 = 73856093, P2 = 19349663, P3 = 83492791;
    const BUCKETS = 4096; // power of 2 for fast modulo
    const MASK    = BUCKETS - 1;

    // counts[b] = number of birds in bucket b
    const counts = md._counts || (md._counts = new Int32Array(BUCKETS));
    counts.fill(0);
    const hashOf = (i) => {
      const gx = Math.floor(pos[i*3]   * INV);
      const gy = Math.floor(pos[i*3+1] * INV);
      const gz = Math.floor(pos[i*3+2] * INV);
      return ((gx * P1) ^ (gy * P2) ^ (gz * P3)) & MASK;
    };

    // First pass: count per bucket
    for (let i = 0; i < N; i++) counts[hashOf(i)]++;

    // Prefix sum → start index per bucket
    const starts = md._starts || (md._starts = new Int32Array(BUCKETS));
    starts[0] = 0;
    for (let b = 1; b < BUCKETS; b++) starts[b] = starts[b-1] + counts[b-1];

    // Second pass: fill indices into sorted array
    const indices = md._indices || (md._indices = new Int32Array(N));
    const cursor  = md._cursor  || (md._cursor  = new Int32Array(BUCKETS));
    cursor.set(starts);
    for (let i = 0; i < N; i++) { const b = hashOf(i); indices[cursor[b]++] = i; }

    const SEP_R2 = 1.1 * 1.1, SEP_F = 0.028;
    const ALI_R2 = 2.8 * 2.8, ALI_F = 0.016;
    const COH_R2 = 3.8 * 3.8, COH_F = 0.006;
    const MAX_SP = 0.13, MIN_SP = 0.045;
    const BX = 24, BY = 11, BZ = 18, CY = 11;
    const MAX_NEIGHBORS = 10;

    for (let i = 0; i < N; i++) {
      const ix = pos[i*3], iy = pos[i*3+1], iz = pos[i*3+2];
      let sx = 0, sy = 0, sz = 0;
      let ax = 0, ay = 0, az = 0;
      let cx = 0, cy = 0, cz = 0;
      let nc = 0, found = 0;

      const gx0 = Math.floor(ix * INV);
      const gy0 = Math.floor(iy * INV);
      const gz0 = Math.floor(iz * INV);

      outer:
      for (let dx2 = -1; dx2 <= 1; dx2++)
      for (let dy2 = -1; dy2 <= 1; dy2++)
      for (let dz2 = -1; dz2 <= 1; dz2++) {
        const b = (((gx0+dx2)*P1) ^ ((gy0+dy2)*P2) ^ ((gz0+dz2)*P3)) & MASK;
        const s = starts[b], e = s + counts[b];
        for (let k = s; k < e; k++) {
          const j = indices[k];
          if (j === i) continue;
          const ddx = ix - pos[j*3], ddy = iy - pos[j*3+1], ddz = iz - pos[j*3+2];
          const d2 = ddx*ddx + ddy*ddy + ddz*ddz;
          if (d2 < SEP_R2 && d2 > 0) { const d = Math.sqrt(d2); sx += ddx/d; sy += ddy/d; sz += ddz/d; }
          if (d2 < ALI_R2) { ax += vel[j*3]; ay += vel[j*3+1]; az += vel[j*3+2]; nc++; }
          if (d2 < COH_R2) { cx += pos[j*3]; cy += pos[j*3+1]; cz += pos[j*3+2]; }
          if (++found >= MAX_NEIGHBORS) break outer;
        }
      }

      let nvx = vel[i*3]   + sx*SEP_F + hx;
      let nvy = vel[i*3+1] + sy*SEP_F;
      let nvz = vel[i*3+2] + sz*SEP_F + hz;

      if (nc > 0) {
        nvx += (ax/nc) * ALI_F + (cx/nc - ix) * COH_F;
        nvy += (ay/nc) * ALI_F + (cy/nc - iy) * COH_F;
        nvz += (az/nc) * ALI_F + (cz/nc - iz) * COH_F;
      }

      // Boundary soft pull
      const bx2 = ix/BX, by2 = (iy-CY)/BY, bz2 = iz/BZ;
      const bd = bx2*bx2 + by2*by2 + bz2*bz2;
      if (bd > 0.55) { const f = (bd - 0.55) * 0.018; nvx -= ix*f; nvy -= (iy-CY)*f; nvz -= iz*f; }

      // Hawk repulsion
      for (let h = 0; h < md.hawks.length; h++) {
        const hw = md.hawks[h];
        const hdx = ix-hw.x, hdy = iy-hw.y, hdz = iz-hw.z;
        const hd2 = hdx*hdx + hdy*hdy + hdz*hdz;
        if (hd2 < 144 && hd2 > 0.001) {
          const hd = Math.sqrt(hd2); const f = (12-hd)/12*0.18;
          nvx += (hdx/hd)*f; nvy += (hdy/hd)*f; nvz += (hdz/hd)*f;
        }
      }

      // Clamp speed
      const spd = Math.sqrt(nvx*nvx + nvy*nvy + nvz*nvz);
      if (spd > MAX_SP) { nvx = nvx/spd*MAX_SP; nvy = nvy/spd*MAX_SP; nvz = nvz/spd*MAX_SP; }
      if (spd < MIN_SP) { nvx = nvx/spd*MIN_SP; nvy = nvy/spd*MIN_SP; nvz = nvz/spd*MIN_SP; }

      vel[i*3] = nvx; vel[i*3+1] = nvy; vel[i*3+2] = nvz;
    }
  }

  // Always integrate positions (smooth at 30fps even when boids run at 15fps)
  for (let i = 0; i < N; i++) {
    pos[i*3]   += vel[i*3];
    pos[i*3+1] += vel[i*3+1];
    pos[i*3+2] += vel[i*3+2];
  }

  md.flock.geometry.attributes.position.needsUpdate = true;

  // ── Hawks update ──────────────────────────────────────────────
  for (let h = md.hawks.length - 1; h >= 0; h--) {
    const hw = md.hawks[h];
    hw.age += 1/30;
    hw.x += hw.vx; hw.y += hw.vy * 0.3; hw.z += 0.04;
    for (let p = hw.TRAIL - 1; p > 0; p--) {
      hw.tPos[p*3]   = hw.tPos[(p-1)*3];
      hw.tPos[p*3+1] = hw.tPos[(p-1)*3+1];
      hw.tPos[p*3+2] = hw.tPos[(p-1)*3+2];
    }
    hw.tPos[0] = hw.x; hw.tPos[1] = hw.y; hw.tPos[2] = hw.z;
    hw.pts.geometry.attributes.position.needsUpdate = true;
    hw.pts.material.opacity = Math.min(1, hw.age/0.8) * Math.max(0, 1-(hw.age-6)/2) * 0.92;
    if (hw.age > 8) {
      scene.remove(hw.pts); hw.pts.geometry.dispose(); hw.pts.material.dispose();
      md.hawks.splice(h, 1);
    }
  }

  // Gentle camera sway
  md.camAngle = (md.camAngle || 0) + 0.0006;
  camera.position.x += (Math.sin(md.camAngle) * 6 - camera.position.x) * 0.004;
  camera.lookAt(0, 11, 0);
}

function clickMurmuration() {
  if (md.hawks && md.hawks.length >= 3) return;
  if (!md.hawks) md.hawks = [];

  raycaster.setFromCamera(clickVec, camera);
  const origin = raycaster.ray.at(22, new THREE.Vector3());

  const TRAIL = 12;
  const tPos  = new Float32Array(TRAIL * 3);
  for (let i = 0; i < TRAIL; i++) {
    tPos[i*3] = origin.x; tPos[i*3+1] = origin.y; tPos[i*3+2] = origin.z;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(tPos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xff8822, size: 0.55, transparent: true, opacity: 0,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);

  md.hawks.push({
    pts, tPos, TRAIL,
    x: origin.x, y: origin.y, z: origin.z,
    vx: (Math.random() - 0.5) * 0.08,
    vy: (Math.random() - 0.5) * 0.04,
    age: 0,
  });
}



function spawnClickRipple(x, y) {
  const el = document.createElement('div');
  el.className = 'click-ripple';
  el.style.left = x + 'px';
  el.style.top  = y + 'px';
  document.body.appendChild(el);
  setTimeout(function() { el.remove(); }, 800);
}

function updateSpeedIndicator() {
  if (!speedIndicatorEl) return;
  const t     = Math.max(0, Math.min(1, ((md.baseSpeed || 0.07) - 0.02) / (0.35 - 0.02)));
  const level = Math.round(t * 5);
  speedIndicatorEl.querySelectorAll('.spip').forEach(function(pip, i) {
    pip.classList.toggle('active', i < level);
  });
  speedIndicatorEl.style.opacity = '1';
  clearTimeout(speedIndicatorEl._hideTimer);
  speedIndicatorEl._hideTimer = setTimeout(function() {
    speedIndicatorEl.style.opacity = '0';
  }, 2200);
}

// ============================================================
// CLICK HANDLERS — per mode
// ============================================================

function clickWarp() {
  // On-demand pulse surge
  if (!md.pulsing) {
    md.pulsing    = true;
    md.pulseT     = 0;
    md.pulseTimer = 0;
  }
  // Ring flash
  md.ringFlash = 0.5;
}

function clickForest(e) {
  const screenY = e.clientY / window.innerHeight;
  if (screenY > 0.52 && md.rippleRings) {
    // Lower screen → water — spawn ripple at clicked world position
    raycaster.setFromCamera(clickVec, camera);
    const plane  = new THREE.Plane(new THREE.Vector3(0, 1, 0), 2.2);
    const target = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(plane, target)) {
      const ring = md.rippleRings.find(function(r) { return !r.active; });
      if (ring) {
        ring.active   = true;
        ring.age      = 0;
        ring.maxAge   = 2.0 + Math.random() * 0.8;
        ring.baseX    = target.x;
        ring.baseZ    = target.z;
        ring.mesh.position.set(target.x, -2.18, target.z);
        ring.mesh.scale.setScalar(0.1);
        ring.mesh.material.opacity = 0.85;
        ring.nextSpawn = 3 + Math.random() * 4;
      }
    }
  } else if (md.sPos && md.SPORES) {
    // Upper screen — scatter spores outward from cursor depth-point
    raycaster.setFromCamera(clickVec, camera);
    const pt = raycaster.ray.at(10, new THREE.Vector3());
    for (let i = 0; i < md.SPORES; i++) {
      const dx = md.sPos[i*3]   - pt.x;
      const dz = md.sPos[i*3+2] - pt.z;
      const d  = Math.sqrt(dx*dx + dz*dz);
      if (d < 10) {
        const force = (10 - d) / 10 * 0.45;
        const len   = Math.max(0.001, d);
        md.sPos[i*3]   += (dx / len) * force;
        md.sPos[i*3+2] += (dz / len) * force;
      }
    }
    md.spores.geometry.attributes.position.needsUpdate = true;
  }
}

function clickOcean() {
  // Bioluminescent bloom burst at cursor depth-point
  if (!md.blPos || !md.BIOL) return;
  raycaster.setFromCamera(clickVec, camera);
  const pt = raycaster.ray.at(15, new THREE.Vector3());
  for (let i = 0; i < md.BIOL; i++) {
    const dx = md.blPos[i*3]   - pt.x;
    const dy = md.blPos[i*3+1] - pt.y;
    const dz = md.blPos[i*3+2] - pt.z;
    const d  = Math.sqrt(dx*dx + dy*dy + dz*dz);
    if (d < 9) {
      const force = (9 - d) / 9 * 1.0;
      const len   = Math.max(0.001, d);
      md.blPos[i*3]   += (dx / len) * force;
      md.blPos[i*3+1] += (dy / len) * force;
      md.blPos[i*3+2] += (dz / len) * force;
    }
  }
  md.biolum.geometry.attributes.position.needsUpdate = true;
  md.biolumBoost = 2.2;
}

function clickSacred() {
  // If a shockwave is already active, restore r values cleanly first
  if (md.shockwave && md.shockwave.active && md.nData) {
    md.nData.forEach(function(d) {
      if (d.rBase !== undefined) { d.r = d.rBase; delete d.rBase; }
    });
  }
  // Inflate all node orbital radii, then spring back in updateSacred
  if (md.nData) {
    md.nData.forEach(function(d) {
      d.rBase = d.r;
      d.r     = d.r * 1.45;
    });
  }
  md.shockwave  = { active: true, age: 0, maxAge: 1.6 };
  md.solidPulse = { age: 0, maxAge: 0.75 };
}

function clickDesert(e) {
  // Always fire a shooting star — it starts at the exact click position in world space
  raycaster.setFromCamera(clickVec, camera);
  const origin = raycaster.ray.at(18, new THREE.Vector3());
  spawnClickStar(origin.x, origin.y, origin.z);

  // Also spawn a dust devil if clicking the lower portion of the screen
  const screenY = e.clientY / window.innerHeight;
  if (screenY > 0.62) {
    const plane  = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const target = new THREE.Vector3();
    if (raycaster.ray.intersectPlane(plane, target)) {
      spawnDustDevil(target.x, target.z);
    }
  }
}

function spawnClickStar(sx, sy, sz) {
  if (!md.clickStars) md.clickStars = [];
  if (md.clickStars.length >= 5) return;

  const TRAIL = 16;
  const pos   = new Float32Array(TRAIL * 3);
  const geo   = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(pos, 3));
  const mat = new THREE.PointsMaterial({
    color: 0xffffff, size: 1.1, transparent: true, opacity: 0.95,
    blending: THREE.AdditiveBlending, depthWrite: false, sizeAttenuation: true,
  });
  const pts = new THREE.Points(geo, mat);
  scene.add(pts);

  // Diagonal trajectory across screen
  const dx = (Math.random() > 0.5 ? 1 : -1) * (0.12 + Math.random() * 0.1);
  const dy = -(0.08 + Math.random() * 0.07);

  md.clickStars.push({ pts, pos, geo, mat, TRAIL, x: sx, y: sy, z: sz, dx, dy, age: 0, maxAge: 1.4 });
}

function clickStorm(e) {
  // Trigger a bolt at the click's horizontal screen position
  const b = md.bolts ? md.bolts.find(function(bolt) { return !bolt.active; }) : null;
  if (!b) return;
  b.active = true;
  b.age    = 0;
  const startX = camera.position.x + (e.clientX / window.innerWidth - 0.5) * 70;
  const startZ = camera.position.z - (25 + Math.random() * 60);
  let cx = startX, cy = 30, cz = startZ;
  for (let s = 0; s < b.SEG; s++) {
    const nx = cx + (Math.random() - 0.5) * 5;
    const ny = cy - (30 / b.SEG) * (1 + Math.random() * 0.6);
    b.bPos[s*6]   = cx; b.bPos[s*6+1]   = cy; b.bPos[s*6+2]   = cz;
    b.bPos[s*6+3] = nx; b.bPos[s*6+4]   = ny; b.bPos[s*6+5]   = cz;
    cx = nx; cy = ny;
  }
  b.line.geometry.attributes.position.needsUpdate = true;
  b.line.material.color.setHSL(0.60 + Math.random() * 0.08, 0.4, 0.92);
  const midSeg = Math.floor(b.SEG * 0.4);
  const bx = b.bPos[midSeg*6+3], by = b.bPos[midSeg*6+4];
  let bx2 = bx, by2 = by;
  for (let s = 0; s < 6; s++) {
    const nx2 = bx2 + (Math.random() - 0.5) * 4;
    const ny2 = by2 - (12/6) * (1 + Math.random() * 0.5);
    b.branchPos[s*6]   = bx2; b.branchPos[s*6+1]   = by2; b.branchPos[s*6+2]   = cz;
    b.branchPos[s*6+3] = nx2; b.branchPos[s*6+4]   = ny2; b.branchPos[s*6+5]   = cz;
    bx2 = nx2; by2 = ny2;
  }
  b.branch.geometry.attributes.position.needsUpdate = true;
  b.nextSpawn = stormHeavy ? 2 + Math.random() * 6 : 12 + Math.random() * 18;
  md.flashIntensity = 0.9 + Math.random() * 0.1;
  md.cloudGlow.position.set(startX, 25, startZ);
  setTimeout(function() { md.flashIntensity = Math.max(md.flashIntensity, 0.5 + Math.random() * 0.3); }, 80);
}

// ============================================================
// DUST DEVIL — spawned by ground click in Desert Night
// ============================================================

function spawnDustDevil(x, z) {
  if (!md.dustDevils) md.dustDevils = [];
  if (md.dustDevils.length >= 3) return; // max concurrent
  const N       = 90;
  const dPos    = new Float32Array(N * 3);
  const angles  = new Float32Array(N);
  const heights = new Float32Array(N);
  for (let i = 0; i < N; i++) {
    angles[i]  = (i / N) * Math.PI * 2 + Math.random() * 0.5;
    heights[i] = Math.random() * 4;
    const r    = 0.2 + heights[i] * 0.22;
    dPos[i*3]   = x + Math.cos(angles[i]) * r;
    dPos[i*3+1] = heights[i];
    dPos[i*3+2] = z + Math.sin(angles[i]) * r;
  }
  const geo = new THREE.BufferGeometry();
  geo.setAttribute('position', new THREE.BufferAttribute(dPos, 3));
  const pts = new THREE.Points(geo, new THREE.PointsMaterial({
    color: 0x8899cc, size: 0.09, transparent: true, opacity: 0.0,
    depthWrite: false, blending: THREE.AdditiveBlending,
  }));
  scene.add(pts);
  md.dustDevils.push({ pts, dPos, angles, heights, N, x, z, age: 0, maxAge: 5 + Math.random() * 3 });
}
